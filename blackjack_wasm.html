// WASM BRIDGE
// Thin wrapper around the C-API exported by game_logic.cpp.
// ALL game logic lives in C++. This file contains UI only.
// ══════════════════════════════════════════════════════════════════════
const GE = {
  newGame:      ()    => Module.ccall("bj_new_game",      null,     [],         []),
  getState:     ()    => JSON.parse(Module.ccall("bj_get_state",   "string",   [], [])),
  placeBet:     (a)   => Module.ccall("bj_place_bet",     "number", ["number"], [a]),
  cancelBet:    ()    => Module.ccall("bj_cancel_bet",    null,     [],         []),
  deal:         ()    => Module.ccall("bj_deal",          null,     [],         []),
  playerHit:    ()    => Module.ccall("bj_player_hit",    "number", [],         []),
  playerStand:  ()    => Module.ccall("bj_player_stand",  null,     [],         []),
  useSkill:     (i)   => Module.ccall("bj_use_skill",     "string", ["number"], [i]),
  nextRound: () => Module.ccall("bj_next_round", null, [], []),
  runJudgeTurn: ()    => JSON.parse(Module.ccall("bj_run_judge_turn","string",  [], [])),
};

// ══════════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════════
// AUDIO ENGINE  (browser-only, not suitable for C++)
// ══════════════════════════════════════════════════════════════════════
let _ctx = null;
const ac = () => { if (!_ctx) try { _ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} return _ctx; };
const tone = (f,d,t,v,dl=0) => {
  try {
    const c=ac(); if(!c) return; if(c.state==="suspended") c.resume();
    const o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=t||"sine"; o.frequency.value=f;
    const ts=c.currentTime+dl;
    g.gain.setValueAtTime(v||.2,ts); g.gain.exponentialRampToValueAtTime(.0001,ts+d);
    o.start(ts); o.stop(ts+d+.05);
  } catch(e){}
};
const SFX = {
  card:    ()=>tone(1300,.06,"square",.09),
  deal:    (i)=>tone(900+i*70,.07,"square",.08),
  reveal:  ()=>{ tone(110,.9,"sawtooth",.13); tone(73,1.1,"sawtooth",.09,.35); },
  draw:    ()=>{ tone(70,.14,"sine",.28); tone(55,.2,"sine",.17,.1); },
  verdict: ()=>[90,80,70,55].forEach((f,i)=>tone(f,.3,"sine",.22,i*.15)),
  win:     ()=>[523,659,784,1047].forEach((f,i)=>tone(f,.28,"sine",.2,i*.1)),
  lose:    ()=>[220,196,165,130].forEach((f,i)=>tone(f,.4,"sawtooth",.16,i*.14)),
  bust:    ()=>{ tone(140,.7,"sawtooth",.25); tone(100,.6,"sawtooth",.17,.25); },
  betSet:  ()=>tone(440,.07,"sine",.10),
  confirm: ()=>[440,550,660].forEach((f,i)=>tone(f,.12,"sine",.15,i*.06)),
  lowMon:  ()=>[220,180].forEach((f,i)=>tone(f,.4,"sawtooth",.12,i*.2)),
  enrage:  ()=>{ tone(55,1.2,"sawtooth",.35); tone(42,.9,"sawtooth",.22,.3); },
  crit:    ()=>{ [880,1320,1760].forEach((f,i)=>tone(f,.18,"square",.18,i*.06)); tone(60,.6,"sawtooth",.28,.05); },
  hb:      (fast)=>{ const d=fast?.35:.55; [0,1].forEach(i=>{ tone(fast?45:60,fast?.10:.08,fast?"sawtooth":"sine",fast?.45:.35,i*d); }); },
};

// PARTICLES  (canvas visual — browser-only)
// ══════════════════════════════════════════════════════════════════════
function Particles({ enrage }) {
  const ref=useRef(null), pts=useRef([]), raf=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv) return;
    const ctx=cv.getContext("2d");
    const resize=()=>{ cv.width=window.innerWidth; cv.height=window.innerHeight; };
    resize(); window.addEventListener("resize",resize);
    function frame(){
      ctx.clearRect(0,0,cv.width,cv.height);
      if(Math.random()<(enrage?.7:.4)) pts.current.push({
        x:Math.random()*cv.width, y:cv.height+5,
        vx:(Math.random()-.5)*.7, vy:-(Math.random()*1.4+.4),
        life:Math.random()*70+40, ml:110, sz:Math.random()*1.6+.6,
        col:enrage?["#ff1a1a","#ff4400","#cc0000"][Math.floor(Math.random()*3)]:["#c81e1e","#ff3c3c","#d4af37"][Math.floor(Math.random()*3)]
      });
      pts.current=pts.current.filter(p=>p.life>0);
      for(const p of pts.current){p.x+=p.vx;p.y+=p.vy;p.life--;ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1; raf.current=requestAnimationFrame(frame);
    }
    frame();
    return ()=>{ cancelAnimationFrame(raf.current); pts.current=[]; window.removeEventListener("resize",resize); };
  },[enrage]);
  return <canvas ref={ref} className="pcv"/>;
}

// CARD VIEW  (render data received from C++ via WASM)
// ══════════════════════════════════════════════════════════════════════
function CardView({ card, animCls, shield, slowReveal, crit }) {
  const red = card.suit==="H"||card.suit==="D";
  if (card.faceDown) return (
    <div className={`card cback ${animCls||""}`}>
      <div className="cback-grid">{Array(25).fill(0).map((_,i)=><div key={i} className="cback-dot"/>)}</div>
    </div>
  );
  const cls = slowReveal?"asr":(animCls||"");
  return (
    <div className={`card cface${red?" red":""}${shield?" shield":""} ${cls}${crit?" crit-glow":""}`}>
      <div><div className="cr">{card.rank}</div><div className="cs">{SYM[card.suit]}</div></div>
      <div className="cc">{SYM[card.suit]}</div>
      <div className="crb">{card.rank}</div>
    </div>
  );
}

// UI sub-components
function HpBar({ money }) {
  const pct=Math.max(0,Math.min(100,(money/STARTING_CREDITS)*100));
  const cls=pct>50?"full":pct>20?"med":"low";
  return (
    <div className="hp-sec">
      <div className="hp-row"><span className="hp-lbl">HP</span><span className="hp-val">{money}/{STARTING_CREDITS}</span></div>
      <div className="hp-out"><div className={`hp-in ${cls}`} style={{width:`${pct}%`}}/></div>
    </div>
  );
}

function JudgeHpBar({ judgeHp, enrage, healFlash }) {
  const pct = Math.max(0, Math.min(100, (judgeHp / JUDGE_MAX_HP) * 100));
  const fillCls = enrage ? "enrage" : pct > 50 ? "high" : pct > 30 ? "mid" : "low";

  // milestones: ENRAGE threshold + half
  const milestones = [
    { label: "ENRAGE", hp: ENRAGE_THRESHOLD, pct: (ENRAGE_THRESHOLD/JUDGE_MAX_HP)*100 },
    { label: "HALF",   hp: JUDGE_MAX_HP/2,   pct: 50 },
  ];

  // 10 segments แบ่ง HP bar ให้อ่านง่าย
  const segs = Array(10).fill(0);

  return (
    <div className={`jbar${enrage?" enrage":""}`} style={{position:"relative"}}>
      <div className="jbar-hdr">
        <div className="jbar-left">
          <span className={`jbar-name${enrage?" enrage":""}`}>
            ⚖ THE JUDGE{enrage&&<span className="p2-badge">PHASE 2</span>}
          </span>
          <span className={`jbar-phase${enrage?" enrage":""}`}>
            {enrage ? "▸ ENRAGE ACTIVE" : pct > 50 ? "▸ PHASE 1" : "▸ CRITICAL ZONE"}
          </span>
        </div>
        <div className="jbar-right">
          <span className={`jbar-hp-num${enrage?" enrage":""}`}>¢{judgeHp.toLocaleString()}</span>
          <span className="jbar-hp-max">/ ¢{JUDGE_MAX_HP.toLocaleString()}</span>
        </div>
      </div>

      <div className="jbar-wrap">
        {/* main bar */}
        <div className="jbar-track">
          <div className={`jbar-fill ${fillCls}`} style={{width:`${pct}%`}}>
            <div className="jbar-fill-shine"/>
          </div>
          {/* segment dividers overlaid */}
          <div className="jbar-segs">
            {segs.map((_,i)=><div key={i} className="jbar-seg"/>)}
          </div>
          {/* milestone markers */}
          {milestones.map(m=>(
            <div key={m.label} style={{
              position:"absolute", top:0, bottom:0,
              left:`${m.pct}%`,
              width:"2px",
              background: m.label==="ENRAGE"
                ? (enrage?"rgba(255,26,26,.9)":"rgba(255,26,26,.5)")
                : "rgba(255,200,0,.35)",
              zIndex:2,
              pointerEvents:"none"
            }}/>
          ))}
        </div>

        {/* milestone labels below bar */}
        <div style={{position:"relative",height:14}}>
          {milestones.map(m=>(
            <span key={m.label} style={{
              position:"absolute",
              left:`${m.pct}%`,
              transform:"translateX(-50%)",
              fontSize:9,
              letterSpacing:1,
              color: m.label==="ENRAGE"
                ? (judgeHp<=ENRAGE_THRESHOLD?"#ff1a1a":"#7a2020")
                : (judgeHp<=JUDGE_MAX_HP/2?"#7a6010":"#7a6010"),
              whiteSpace:"nowrap"
            }}>
              {m.label==="ENRAGE"?"⚠ ENRAGE":"◆ HALF"}
            </span>
          ))}
          {/* pct label far right */}
          <span style={{position:"absolute",right:0,fontSize:10,color:enrage?C.enrage:"#5a2020",letterSpacing:1}}>
            {Math.round(pct)}%
          </span>
        </div>
      </div>

      {enrage&&<div className="enr-warn">⚠ ENRAGE MODE — MIN BET ¢{ENRAGE_MIN_BET} ⚠</div>}
      {healFlash>0&&<div className="heal-float">♥ +¢{healFlash} LIFE STEAL</div>}
    </div>
  );
}

function StreakPips({ wins }) {
  const inCycle=wins%2, bonus=wins>0&&inCycle===0;
  const nextBonus=[3,5,7].find(k=>k>wins);
  return (
    <div className="streak-box">
      <span className="streak-lbl">WIN STREAK</span>
      <div className="pips">
        {[0,1].map(i=>{ const lit=inCycle>i||(bonus&&i<2); return <div key={i} className={`pip${lit?" lit":""}${bonus?" bonus":""}`}/>; })}
      </div>
      <div className="streak-hint">
        {wins===0?"2 in a row = skill":bonus?"✦ SKILL EARNED!":nextBonus?`${nextBonus-wins} more → skill`:`streak: ${wins}`}
      </div>
    </div>
  );
}

function RiskMeter({ bet, money }) {
  const pct=Math.min(100,money>0?(bet/money)*100:100);
  const bg=pct<30?C.green:pct<60?C.gold:C.redB;
  return (
    <div style={{width:"100%",display:"flex",flexDirection:"column",gap:6}}>
      <div className="risk-track"><div className="risk-fill" style={{width:`${pct}%`,background:bg,color:bg}}/></div>
      <div className="risk-lbl" style={{color:bg}}>{pct<30?"LOW RISK":pct<60?"MED RISK":"HIGH RISK"} — {Math.round(pct)}%</div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════
// APP — reads state from C++ via WASM, renders it as React UI
// ══════════════════════════════════════════════════════════════════════
function App() {
  // gs = state snapshot from C++ GameEngine::stateJson()
  const [gs, setGs]             = useState(null);
  const [wasmReady, setWasmReady] = useState(false);
  const [flash, setFlash]       = useState("");
  const [tension, setTension]   = useState(0);
  const [jStatus, setJStatus]   = useState("");
  const [showResult, setShowResult] = useState(false);
  const [newSkill, setNewSkill] = useState("");
  const [anims, setAnims]       = useState({});
  const [moneyAnim, setMoneyAnim] = useState("");
  const [betAdj, setBetAdj]     = useState(false);
  const [betAmount, setBetAmount] = useState(MIN_BET);
  const [betConfirming, setBetConfirming] = useState(false);
  const [playerScore, setPlayerScore] = useState(0);
  const [slowIdx, setSlowIdx]   = useState(-1);
  const [shakeClass, setShake]  = useState("");
  const [showCrit, setShowCrit] = useState(false);
  const [critIdx, setCritIdx]   = useState(-1);
  const [healFlash, setHealFlash] = useState(0);
  const [lastDelta, setLastDelta] = useState(null);
  const [lastMult, setLastMult] = useState(1);
  const [judgeRevealScore, setJudgeRevealScore] = useState(null); // null = ใช้ jScore ปกติ
  const [showIntro, setShowIntro] = useState(true);
  const [introPage, setIntroPage] = useState(0);

  const gsRef=useRef(gs), busy=useRef(false), timers=useRef([]);
  useEffect(()=>{ gsRef.current=gs; },[gs]);

  const sleep = ms => new Promise(r=>{ const t=setTimeout(r,ms); timers.current.push(t); });
  const addAnim = (k,cls) => { setAnims(p=>({...p,[k]:cls})); setTimeout(()=>setAnims(p=>{const n={...p};delete n[k];return n;}),700); };
  const trigFlash = t => { setFlash(t); setTimeout(()=>setFlash(""),600); };
  const trigMoney = t => { setMoneyAnim(t); setTimeout(()=>setMoneyAnim(""),600); };
  const trigShake = big => { setShake(big?"shake":"shakeSm"); setTimeout(()=>setShake(""),500); };
  const trigCrit  = () => { setShowCrit(true); setTimeout(()=>setShowCrit(false),1000); };

  // Pull full state from C++ GameEngine singleton
  const pull = () => { const s=GE.getState(); setGs(s); return s; };
  const safeMsg = (s) => (s && s.message) ? s.message : "";

  // Wait for Emscripten Module to be ready.
  // Uses onRuntimeInitialized callback + polling fallback so it works
  // regardless of whether the WASM finishes before or after React mounts.
  useEffect(()=>{
    let done = false;
    function initGame() {
      if (done) return;
      done = true;
      GE.newGame();
      pull();
      setBetAmount(MIN_BET);
      setWasmReady(true);
    }
    function check() {
      if (done) return;
      if (typeof Module !== "undefined" &&
          typeof Module.ccall === "function" &&
          typeof Module._bj_new_game === "function") {
        initGame();
      } else {
        setTimeout(check, 80);
      }
    }
    if (typeof Module !== "undefined") {
      if (typeof Module._bj_new_game === "function") {
        initGame();
      } else {
        const prev = Module.onRuntimeInitialized;
        Module.onRuntimeInitialized = function() {
          if (typeof prev === "function") prev();
          initGame();
        };
        setTimeout(check, 400);
      }
    } else {
      check();
    }
  },[]);
  // KEYBOARD
  useEffect(()=>{
    const h=e=>{
      const ph=gsRef.current?.phase;
      if(ph==="PLAYER_TURN"){ if(e.key==="h"||e.key==="H") playerHit(); if(e.key==="s"||e.key==="S") playerStand(); }
      if(ph==="ROUND_OVER"&&e.key==="Enter") nextRound();
      if((ph==="GAME_OVER"||ph==="VICTORY")&&(e.key==="r"||e.key==="R")) restart();
      if(ph==="BETTING"){
        if(!betConfirming){ if(e.key==="ArrowUp") adjBet(10); if(e.key==="ArrowDown") adjBet(-10); if(e.key==="Enter") requestBet(); }
        else { if(e.key==="Enter") confirmBet(); if(e.key==="Escape") cancelBet(); }
      }
    };
    window.addEventListener("keydown",h);
    return ()=>window.removeEventListener("keydown",h);
  });

  if (!wasmReady) return (
    <>
      <style>{CSS}</style>
      <div className="loading">
        <div className="loading-ttl">LOADING ENGINE...</div>
        <div className="loading-sub">Initialising WASM / C++ backend</div>
      </div>
    </>
  );

  const enrage = gs.judgeHp<=ENRAGE_THRESHOLD&&gs.judgeHp>0;
  const effMin  = enrage?ENRAGE_MIN_BET:MIN_BET;
  const isLow   = gs.money<=LOW_MONEY;

  // BET
  const adjBet = delta => {
    if(busy.current||betConfirming) return;
    const next=Math.max(effMin,Math.min(gs.money,betAmount+delta));
    SFX.betSet(); setBetAdj(true); setTimeout(()=>setBetAdj(false),180);
    if(gs.money<=LOW_MONEY) SFX.lowMon();
    setBetAmount(next);
  };
  const setBetQ = ratio => {
    if(busy.current||betConfirming) return;
    const amt=Math.max(effMin,Math.min(gs.money,Math.floor(gs.money*ratio)));
    SFX.betSet(); setBetAdj(true); setTimeout(()=>setBetAdj(false),180);
    setBetAmount(amt);
  };
  const requestBet = () => {
    if(busy.current||betAmount<effMin||betAmount>gs.money) return;
    SFX.betSet(); setBetConfirming(true);
  };
  const cancelBet = () => { if(busy.current) return; setBetConfirming(false); GE.cancelBet(); };

  // DEAL — calls C++ placeBet + deal, reads back state card-by-card for animation
  const confirmBet = async () => {
    if(busy.current||betAmount<effMin||betAmount>gs.money) return;
    busy.current=true; SFX.confirm(); setBetConfirming(false);
    GE.placeBet(betAmount);
    const enrNow = enrage;
    if(enrNow) trigShake(true);
    setTension(0); setJStatus(""); setShowResult(false); setNewSkill(""); setSlowIdx(-1); setPlayerScore(0); setCritIdx(-1);
    // C++ deals 4 cards and advances to PLAYER_TURN
    GE.deal(); let s=pull();
    // animate cards appearing one by one with flip animation
    setGs({...s,playerHand:[],judgeHand:[]});
    await sleep(200); SFX.deal(0); setGs({...s,playerHand:[s.playerHand[0]],judgeHand:[]}); addAnim("p-0","ar");
    await sleep(350); SFX.deal(1); setGs({...s,playerHand:s.playerHand.slice(0,2),judgeHand:[]}); addAnim("p-1","ar");
    await sleep(350); SFX.deal(2); setGs({...s,playerHand:s.playerHand.slice(0,2),judgeHand:[s.judgeHand[0]]}); addAnim("j-0","ar");
    await sleep(350); SFX.deal(3); setGs(s); addAnim("j-1","ar");
    const ps = calcScore(s.playerHand);
    setPlayerScore(ps);
    if(s.playerHand.length===2&&ps===21){ SFX.crit(); setCritIdx(1); setTimeout(()=>setCritIdx(-1),1000); }
    busy.current=false;
  };

  // HIT — calls C++ playerHit, reads result
  const playerHit = async () => {
    if(!gs||gs.phase!=="PLAYER_TURN"||busy.current) return;
    busy.current=true;
    const prevLen=gs.playerHand.length, enrNow=enrage;
    if(playerScore>=17){
      SFX.hb(enrNow);
      await sleep(enrNow?150:200);
    }
    SFX.preRev?.(); SFX.card();
    GE.playerHit(); const s=pull();
    const idx=prevLen;
    setGs({...s, playerHand: s.playerHand.slice(0, prevLen)});
    await sleep(80);
    setGs(s); addAnim(`p-${idx}`,"ar");
    const sc = calcScore(s.playerHand);
    setPlayerScore(sc);
    if(s.phase==="JUDGE_REVEAL"){ // busted
      SFX.bust(); trigFlash("fb"); trigShake(enrNow);
      setPlayerScore(0); await sleep(600); await runJudge(s);
    } else {
      busy.current=false;
    }
  };

  // STAND — calls C++ playerStand
  const playerStand = async () => {
    if(!gs||gs.phase!=="PLAYER_TURN"||busy.current) return;
    busy.current=true;
    setPlayerScore(0); GE.playerStand(); pull();
    await sleep(300); await runJudge(gsRef.current);
  };

  // คำนวณ score จาก hand array (รองรับ Ace 1/11)
  const calcScore = (hand) => {
    let total = 0, aces = 0;
    for(const c of hand){ if(c.faceDown) continue; total += c.value; if(c.rank==="A") aces++; }
    while(total > 21 && aces > 0){ total -= 10; aces--; }
    return total;
  };

  // JUDGE SEQUENCE — เปิดการ์ดทีละใบ อัปเดต score สดๆ
  const runJudge = async (prevS) => {
    const enrNow = (prevS?.judgeHp||gs?.judgeHp||JUDGE_MAX_HP)<=ENRAGE_THRESHOLD;
    const fast = enrNow;
    setJudgeRevealScore(null);
    setJStatus(fast?"▶  THE JUDGE RISES...":"▶  THE JUDGE AWAKENS...");
    SFX.reveal(); if(fast) trigShake(true);
    setTension(12); await sleep(fast?900:1300);

    // ── ขั้น 1: เปิดใบที่ 2 (hidden card) ──────────────────────────────
    setJStatus("▶  SCANNING HAND..."); setTension(32);
    const curS = gsRef.current;
    if(curS && curS.judgeHand.length >= 2) {
      // อัปเดต UI: เปลี่ยนใบ faceDown → faceUp
      const revealedHand = [curS.judgeHand[0], {...curS.judgeHand[1], faceDown:false}];
      setGs({...curS, judgeHand: revealedHand});
      addAnim("j-1","ar"); SFX.card();
      // แสดง score หลัง reveal ใบที่ 2
      const scoreAfterReveal = calcScore(revealedHand);
      await sleep(fast?300:500);
      setJudgeRevealScore(scoreAfterReveal);
      await sleep(fast?350:550);
    }

    // ── ขั้น 2: C++ draw ทั้งหมดในคราวเดียว แล้ว animate ทีละใบ ────────
    setJStatus(fast?"▶  JUDGE STRIKES...":"▶  JUDGE DRAWS..."); SFX.draw();
    setTension(60);

    // เรียก C++ ครั้งเดียว — ได้ final hand ทั้งหมด
    const outcome = GE.runJudgeTurn();
    const s = pull();

    // เริ่มจาก 2 ใบ แล้วค่อยๆ เพิ่มทีละใบ
    const baseHand = s.judgeHand.slice(0, 2);
    setGs({...curS, judgeHand: baseHand});

    for(let i = 2; i < s.judgeHand.length; i++){
      await sleep(fast?450:600);
      const partialHand = s.judgeHand.slice(0, i+1);
      setGs(prev => ({...prev, judgeHand: partialHand}));
      addAnim(`j-${i}`,"adr"); SFX.card();
      // อัปเดต score หลังแต่ละใบ
      const scoreNow = calcScore(partialHand);
      await sleep(fast?200:300);
      setJudgeRevealScore(scoreNow);
      if(scoreNow > 21){ // bust ทันที
        SFX.bust(); await sleep(fast?250:350);
        break;
      }
    }

    // ── ขั้น 3: สรุปผล ───────────────────────────────────────────────
    setTension(100);
    setJStatus("▶  CALCULATING VERDICT..."); SFX.verdict();
    await sleep(fast?600:900);
    setGs(s); // sync state ให้ครบ
    setJudgeRevealScore(null); // กลับไปใช้ jScore ปกติ

    const wasEnr=(prevS?.judgeHp||JUDGE_MAX_HP)<=ENRAGE_THRESHOLD;
    const nowEnr=s.judgeHp<=ENRAGE_THRESHOLD&&s.judgeHp>0;

    if(outcome.critHit){ SFX.crit(); trigCrit(); trigFlash("fc"); trigShake(true);
      if(outcome.result==="PLAYER_WIN"){ setCritIdx(s.playerHand.length-1); setTimeout(()=>setCritIdx(-1),1200); }
    } else if(outcome.result==="PLAYER_WIN"){ SFX.win(); trigFlash("fw"); trigMoney("gain"); }
    else if(outcome.result==="JUDGE_WIN"){ SFX.lose(); trigFlash("fl"); trigMoney("loss"); if(s.money<=LOW_MONEY) trigShake(true); }

    if(outcome.result==="JUDGE_WIN"&&outcome.judgeHpDelta>0){
      setHealFlash(outcome.judgeHpDelta); setTimeout(()=>setHealFlash(0),2400);
    }
    if(!wasEnr&&nowEnr){ await sleep(200); SFX.enrage(); trigShake(true); trigFlash("fl"); }

    setLastDelta(outcome.creditDelta); setLastMult(outcome.streakMultiplier);
    setJStatus(""); await sleep(200); setTension(0); setShowResult(true);
    if(outcome.newSkillName) setNewSkill(outcome.newSkillName);
    busy.current=false;
  };

  // SKILL — calls C++ useSkill, pull result
  const useSkill = i => {
    if(!gs||gs.phase!=="PLAYER_TURN"||busy.current) return;
    busy.current = true;
    SFX.card();
    GE.useSkill(i);
    pull();            // pull() already calls setGs internally
    busy.current = false;
  };

  // NEXT ROUND
const nextRound = () => {
  if(busy.current) return;
  GE.nextRound();  // ← เพิ่มบรรทัดนี้! บอก C++ ให้กลับไป BETTING
  setShowResult(false); setNewSkill(""); setTension(0); setJStatus(""); 
  setSlowIdx(-1); setPlayerScore(0); setCritIdx(-1); setJudgeRevealScore(null);
  const enrNow = gsRef.current?.judgeHp <= ENRAGE_THRESHOLD;
  setBetAmount(Math.max(enrNow ? ENRAGE_MIN_BET : MIN_BET, 
    Math.min(betAmount, gsRef.current?.money || MIN_BET)));
  setBetConfirming(false); 
  setGs({...GE.getState()});  // pull state หลัง C++ reset แล้ว
};

  // RESTART — clears ALL state and routes back to the main menu (intro).
  // The player must manually click through the intro and start a new session.
  const restart = () => {
    timers.current.forEach(clearTimeout); timers.current=[]; busy.current=false;
    setShowResult(false); setNewSkill(""); setTension(0); setJStatus(""); setFlash(""); setMoneyAnim("");
    setPlayerScore(0); setSlowIdx(-1); setShake(""); setCritIdx(-1); setShowCrit(false); setHealFlash(0);
    setLastDelta(null); setLastMult(1); setBetConfirming(false); setJudgeRevealScore(null);
    GE.newGame(); const s=pull(); setBetAmount(MIN_BET); setGs(s);
    // Route back to intro / main menu — player starts fresh from page 0
    setIntroPage(0); setShowIntro(true);
  };



  const INTRO_PAGES = [
    {
      eyebrow: "CLASSIFIED — SECTOR 7 TRIBUNAL",
      title: "THE JUDGMENT PROTOCOL",
      text: <>The world has withered. Resources are a ghost of the past, and the population is a burden the state can no longer bear.<br/><br/>Welcome to <em>JUDGMENT DAY</em>.</>
    },
    {
      eyebrow: "YOUR STATUS: SELECTED",
      title: "STAND BEFORE THE JUDGE",
      text: <>You have been <em>selected</em>. You stand before <em>THE JUDGE</em> — a cold, unyielding system designed to cull the herd.<br/><br/>Your fate is not decided by trial, but by the cards.</>
    },
    {
      eyebrow: "THE PROTOCOL",
      title: "RULES OF ENGAGEMENT",
      text: <>The rules of <em>Blackjack</em> — the ancient game of twenty-one — are the only barrier between your continued existence and <em>total erasure</em> from the system.<br/><br/>Win, and you earn your <em>liberation</em>. Lose, and you are <em>terminated</em>.</>
    },
    {
      eyebrow: "INITIATING SESSION...",
      title: "PLAY TO SURVIVE.",
      text: <>The deck is shuffled. The Judge is watching.<br/><br/>Defeat <em>THE JUDGE</em> before your credits run dry — or be erased from the system forever.<br/><br/>Will you beat the odds, or will you be the next casualty of the protocol?</>
    },
  ];

  if(showIntro) {
    const pg = INTRO_PAGES[introPage];
    const isLast = introPage === INTRO_PAGES.length - 1;
    const advance = () => {
      if(isLast){ setShowIntro(false); }
      else { setIntroPage(p=>p+1); }
    };
    return (
      <>
        <style>{CSS}</style>
        <div className="intro-ov" onClick={e=>{if(e.target===e.currentTarget) advance();}}>
          <div className="intro-box">
            <div className="intro-header">
              <div className="intro-eyebrow">{pg.eyebrow}</div>
              <div className="intro-title">{pg.title}</div>
            </div>
            <div className="intro-body">
              <div className="intro-pg" key={introPage}>
                <p className="intro-pg-text">{pg.text}</p>
              </div>
            </div>
            <div className="intro-footer">
              <div className="intro-dots">
                {INTRO_PAGES.map((_,i)=><div key={i} className={`intro-dot${i===introPage?" active":""}`}/>)}
              </div>
              <button className={`intro-btn${isLast?" final":""}`} onClick={advance}>
                {isLast ? "▶ BEGIN SESSION" : "NEXT ▶"}
              </button>
            </div>
          </div>
        </div>
      </>
    );
  }

  // DERIVED
  const pScore = calcScore(gs.playerHand);
  // Use calcScore() here too so Judge's final score folds Aces correctly in the result overlay
  const _jScoreRaw = calcScore(gs.judgeHand);
  // ใช้ judgeRevealScore ระหว่าง animation เพื่อแสดง score ที่ค่อยๆ เพิ่มทีละใบ
  const jScore = judgeRevealScore !== null ? judgeRevealScore : _jScoreRaw;
  const showJScore = !["BETTING","PLAYER_TURN","DEALING"].includes(gs.phase);
  const isTense = gs.phase==="JUDGE_REVEAL"||gs.phase==="JUDGE_TURN";
  const hbCls=(()=>{ if(enrage) return "hbEnr"; if(gs.phase!=="PLAYER_TURN") return ""; return playerScore>=20?"hb20":playerScore>=19?"hb19":playerScore>=18?"hb18":playerScore>=17?"hb17":""; })();
  const pZoneCls=(()=>{ if(gs.phase!=="PLAYER_TURN") return ""; return playerScore>=20?"ht20":playerScore>=19?"ht19":playerScore>=18?"ht18":playerScore>=17?"ht17":""; })();
  const RES={PLAYER_WIN:{t:"SURVIVAL CONFIRMED",c:C.green},JUDGE_WIN:{t:"ELIMINATED",c:C.redB},DRAW:{t:"STALEMATE",c:C.grey}};
  const multLbl=lastMult>1?` (×${lastMult} STREAK!)` : "";
  const lrhCls=lastDelta===null?"":(lastDelta>0?"win":lastDelta<0?"lose":"draw");
  const lrhTxt=lastDelta===null?"":(lastDelta>0?`▲ LAST: +¢${lastDelta}`:lastDelta<0?`▼ LAST: -¢${Math.abs(lastDelta)}`:"— LAST: DRAW —");
  function jCardAnim(c,i){ return anims[`j-${i}`]||""; }

  return (
    <>
      <style>{CSS}</style>
      <Particles enrage={enrage}/>
      <div className="scanlines"/>
      <div className={`flash ${flash}`}/>
      <div className={`hbWrap ${hbCls}`}/>
      {showCrit&&<div className="crit-banner">⚡ CRITICAL HIT — 1.5× DAMAGE ⚡</div>}

      <div className={shakeClass} style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <div className={`root${enrage?" enrage":""}`}>

        {/* ── LEFT PANEL ── */}
        <div className={`lp${enrage?" enrage":""}`}>
          <div className="av-block">
            <div className="av-frame">{enrage?"💀":"🃏"}</div>
            <div>
              <div className="av-name">CITIZEN<br/>UNIT-001</div>
              <div className="av-title">{gs.consecutiveWins>=7?"LEGENDARY":gs.consecutiveWins>=5?"CHAMPION":gs.consecutiveWins>=3?"SURVIVOR":"SUBJECT"}</div>
            </div>
          </div>
          <HpBar money={gs.money}/>
          <div className="money-box">
            <div className="money-lbl">CREDITS</div>
            <div className={`money-val${isLow?" danger":""} ${moneyAnim}`}>¢{gs.money}</div>
            <div className={`money-delta ${lastDelta>0?"pos":lastDelta<0?"neg":"zero"}`}>
              {lastDelta!==null&&lastDelta!==0?(lastDelta>0?`+¢${lastDelta}${multLbl}`:`-¢${Math.abs(lastDelta)}`):(lastDelta===null?"\u00A0":"¢0 stalemate")}
            </div>
            {isLow&&<div className="danger-warn">⚠ LOW FUNDS ⚠</div>}
          </div>
          <StreakPips wins={gs.consecutiveWins}/>
          <div className="skills-sec">
            <div className="skills-ttl">SKILLS</div>
            {gs.skills.length===0
              ?<div className="sk-empty">— none acquired —</div>
              :gs.skills.map((sk,i)=>(
                <div key={i} className={`sk-card${gs.phase==="PLAYER_TURN"?" usable":""}`} onClick={()=>useSkill(i)} title={sk.desc}>
                  <div className="sk-name">◈ {sk.name}</div>
                  <div className="sk-desc">{sk.desc}</div>
                </div>
              ))
            }
          </div>
          <div className="round-badge">ROUND {gs.round}</div>
        </div>

        {/* ── RIGHT PANEL ── */}
        <div className="rp">
          <JudgeHpBar judgeHp={gs.judgeHp} enrage={enrage} healFlash={healFlash}/>
          <div className="topbar">
            <div className="title">◈ BLACKJACK: JUDGMENT DAY ◈</div>
            {gs.bet>0&&gs.phase!=="BETTING"&&(
              <div className={`bet-badge${enrage?" enrage":""}`}>
                <div className="bet-badge-lbl">BET</div>
                <div className="bet-badge-val">¢{gs.bet}</div>
              </div>
            )}
          </div>
          <div className="main">

            {/* JUDGE HAND */}
            {gs.phase!=="BETTING"&&(
              <div className={`jzone${isTense?" tense":""}${enrage?" enrage":""}`}>
                <div className="tension-bar"><div className="tension-fill" style={{width:`${tension}%`}}/></div>
                <div className="zone-lbl" style={{color:enrage?C.enrage:C.red,paddingTop:6}}>
                  ▲ THE JUDGE
                  <span className="zone-score" style={{color:
                    (judgeRevealScore!==null?judgeRevealScore:jScore)>21?C.grey
                    :enrage?C.enrage:C.redB}}>
                    {showJScore
                      ? (judgeRevealScore!==null
                          ? <>{judgeRevealScore}{judgeRevealScore>21&&" BUST"}</>
                          : <>{jScore}{jScore>21&&" BUST"}</>)
                      : "??"}
                  </span>
                </div>
                {jStatus&&<div className={`judge-status${enrage?" enrage":""}`}>{jStatus}</div>}
                <div className="hand-row">
                  {gs.judgeHand.map((c,i)=><CardView key={`j-${i}-${c.faceDown?"h":"v"}-${c.rank}${c.suit}`} card={c} animCls={jCardAnim(c,i)}/>)}
                  {gs.judgeHand.length===0&&<span style={{color:C.greyD,fontSize:11,letterSpacing:2}}>AWAITING DEAL</span>}
                </div>
              </div>
            )}

            {/* MIDDLE */}
            <div className="mid">
              <div className={`msg-box${enrage?" enrage":""}`}>
                {(gs.message||"").replace(/^\* /,"")}<span className="cursor"/>
              </div>

              {/* BETTING */}
              {gs.phase==="BETTING"&&!betConfirming&&(
                <div className={`bet-panel${enrage?" enrage":""}`}>
                  {lrhTxt&&<div className={`lrh ${lrhCls}`}>{lrhTxt}</div>}
                  <div className="bet-amt-box">
                    <div className="bet-amt-lbl">WAGER</div>
                    <div className={`bet-amt-val${betAdj?" adj":""}`}>¢{betAmount}</div>
                    <div className="bet-pct">{Math.round((betAmount/gs.money)*100)}% of funds</div>
                  </div>
                  <RiskMeter bet={betAmount} money={gs.money}/>
                  <div className="adj-row">
                    {[-50,-10,10,50].map(d=><button key={d} className="adj-btn" onClick={()=>adjBet(d)}>{d>0?`+${d}`:d}</button>)}
                  </div>
                  <div className="adj-row">
                    {[0.25,0.5,0.75].map(r=><button key={r} className="adj-btn sp" onClick={()=>setBetQ(r)}>{Math.round(r*100)}%</button>)}
                    <button className="adj-btn sp" onClick={()=>setBetQ(1.0)}>ALL IN</button>
                  </div>
                  {enrage&&<div className="enr-bet-warn">⚠ ENRAGE: MIN BET IS ¢{ENRAGE_MIN_BET} ⚠</div>}
                  <button className={`btn btn-bet${enrage?" enrage":""}`} onClick={requestBet} disabled={betAmount<effMin||betAmount>gs.money}>PLACE BET ▶</button>
                  <div style={{fontSize:11,color:"#565668",letterSpacing:2,textAlign:"center"}}>min ¢{effMin} · max ¢{gs.money} · [↑↓] adjust · [ENTER] place</div>
                </div>
              )}

              {/* CONFIRM */}
              {gs.phase==="BETTING"&&betConfirming&&(
                <div className="conf-panel">
                  <div className="conf-ttl">CONFIRM YOUR BET</div>
                  <div className="conf-amt">¢{betAmount}</div>
                  <div className="conf-warn">
                    {isLow?`⚠ Only ¢${gs.money} remaining.`
                      :betAmount===gs.money?"⚠ ALL IN — no safety net."
                      :enrage?"⚠ PHASE 2 — Judge is enraged."
                      :`Committing ¢${betAmount} this round.`}
                  </div>
                  <RiskMeter bet={betAmount} money={gs.money}/>
                  <div className="conf-row">
                    <button className="btn btn-cancel" onClick={cancelBet}>◀ BACK [ESC]</button>
                    <button className="btn btn-confirm" onClick={confirmBet}>CONFIRM [ENTER] ▶▶</button>
                  </div>
                </div>
              )}

              {/* PLAYER TURN */}
              {gs.phase==="PLAYER_TURN"&&(
                <>
                  <div className="act-row">
                    <button className="btn btn-hit" onClick={playerHit}>HIT [H]</button>
                    <button className="btn btn-stand" onClick={playerStand}>STAND [S]</button>
                  </div>
                  {gs.shieldActive&&<div className="shield-bar">⛉ OVERRIDE SHIELD ACTIVE</div>}
                  {gs.skills.length>0&&<div style={{fontSize:9,color:C.grey,letterSpacing:2,textAlign:"center"}}>← click skill in left panel to activate</div>}
                </>
              )}
              {(gs.phase==="JUDGE_REVEAL"||gs.phase==="JUDGE_TURN")&&<div style={{height:40}}/>}
            </div>

            {/* PLAYER HAND */}
            {gs.phase!=="BETTING"&&(
              <div className={`pzone${gs.shieldActive?" shield":""} ${pZoneCls}`}>
                <div className="zone-lbl" style={{color:C.gold}}>
                  ▼ YOU
                  <span className={`zone-score${pScore>21&&!gs.shieldActive?" sdanger":""}`} style={{color:pScore>21&&!gs.shieldActive?C.redB:C.white}}>
                    {gs.playerHand.length?pScore:"--"}{pScore>21&&!gs.shieldActive&&" BUST"}
                  </span>
                </div>
                <div className="hand-row">
                  {gs.playerHand.map((c,i)=><CardView key={`p-${i}-${c.rank}${c.suit}`} card={c} animCls={anims[`p-${i}`]||""} shield={gs.shieldActive} slowReveal={i===slowIdx} crit={i===critIdx}/>)}
                  {gs.playerHand.length===0&&<span style={{color:C.greyD,fontSize:11,letterSpacing:2}}>AWAITING DEAL</span>}
                </div>
              </div>
            )}
          </div>
          <div className="info-bar">
            FRA143 SOFTWARE DEVELOPMENT FOR ROBOTICS AND AUTOMATION ENGINEERING — FIBO KMUTT &nbsp;|&nbsp;
            จิรายุ 68340500013 · ณฐกร 68340500062 · ภูริต 68340500086
          </div>
        </div>
      </div>
      </div>

      {/* ROUND RESULT */}
      {showResult&&gs.phase!=="GAME_OVER"&&gs.phase!=="VICTORY"&&(
        <div className="result-ov" onClick={nextRound}>
          <div className="res-txt" style={{color:RES[gs.result]?.c}}>
            {gs.critHit&&gs.result==="PLAYER_WIN"?"⚡ CRITICAL STRIKE ⚡":gs.critHit&&gs.result==="JUDGE_WIN"?"⚡ COUNTER CRIT ⚡":RES[gs.result]?.t}
          </div>
          {gs.result!=="DRAW"&&(
            <div className={`res-delta ${lastDelta>0?"pos":"neg"}`}>
              {lastDelta>0?`+¢${lastDelta}`:`-¢${Math.abs(lastDelta)}`}{lastMult>1&&` ×${lastMult} STREAK`}{gs.critHit&&" ⚡ CRIT"}
            </div>
          )}
          {gs.result==="DRAW"&&<div className="res-delta zero">No credits exchanged</div>}
          {gs.result==="PLAYER_WIN"&&lastDelta!=null&&(
            <div className={`res-jdmg${enrage?" enr":""}`}>⚖ JUDGE HP: ¢{gs.judgeHp} / ¢{JUDGE_MAX_HP} &nbsp;(−¢{lastDelta} dealt)</div>
          )}
          {gs.result==="JUDGE_WIN"&&gs.judgeHealAmount>0&&(
            <div className="res-jheal">♥ JUDGE RECOVERED ¢{gs.judgeHealAmount} — LIFE STEAL<br/>⚖ JUDGE HP: ¢{gs.judgeHp} / ¢{JUDGE_MAX_HP}</div>
          )}
          <div className="res-sub">You: {pScore} &nbsp;·&nbsp; Judge: {jScore}</div>
          {gs.result==="PLAYER_WIN"&&gs.consecutiveWins>0&&(
            <div className="res-streak">WIN STREAK: {gs.consecutiveWins}{gs.consecutiveWins%3===0?" — MILESTONE!":""}</div>
          )}
          {newSkill&&<div className="sk-notice">✦ SKILL ACQUIRED: {newSkill} ✦</div>}
          <div className="res-sub" style={{color:isLow?C.danger:C.grey}}>Balance: ¢{gs.money}{isLow?" ⚠ CRITICAL":""}</div>
          {enrage&&<div style={{fontSize:11,color:C.enrage,letterSpacing:2,textAlign:"center"}}>⚠ PHASE 2 ACTIVE — MIN BET ¢{ENRAGE_MIN_BET}</div>}
          <div className="res-cont">▼ click or [ENTER] to continue ▼</div>
        </div>
      )}

      {/* GAME OVER — dramatic death screen, routes back to main menu */}
      {gs.phase==="GAME_OVER"&&(
        <div className="gameover-ov">
          <div style={{fontSize:11,letterSpacing:4,color:"#5a0000",marginBottom:8}}>TRIBUNAL VERDICT — FINAL</div>
          <div className="go-ttl">ELIMINATED</div>
          <div style={{fontSize:12,color:C.redB,letterSpacing:3,textAlign:"center",animation:"blink .55s step-end infinite",marginTop:4}}>SUBJECT ERASED FROM SYSTEM</div>
          <div className="go-sub" style={{marginTop:12}}>Your credits ran dry.<br/>The Judge has collected your debt in full.<br/>You no longer exist in the registry.</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"center",padding:"12px 24px",background:"rgba(120,15,15,.15)",border:"1px solid rgba(200,30,30,.25)",borderRadius:2}}>
            <div className="go-stat">ROUNDS SURVIVED: {gs.round}</div>
            <div className="go-stat" style={{color:C.redB}}>CREDITS AT DEATH: ¢{gs.money}</div>
            <div className="go-stat" style={{color:C.grey}}>JUDGE REMAINING HP: ¢{gs.judgeHp} / ¢{JUDGE_MAX_HP}</div>
          </div>
          <button className="btn btn-restart" onClick={restart} style={{marginTop:8}}>◀ RETURN TO MENU [R]</button>
          <div style={{fontSize:10,color:"#3a1515",letterSpacing:2,textAlign:"center",marginTop:4}}>A new session must be started from the beginning.</div>
        </div>
      )}

      {/* VICTORY — routes back to main menu for a full new run */}
      {gs.phase==="VICTORY"&&(
        <div className="victory-ov">
          <div style={{fontSize:11,letterSpacing:4,color:C.goldD,marginBottom:8}}>TRIBUNAL VERDICT — FINAL</div>
          <div className="v-ttl">THE JUDGE HAS FALLEN</div>
          <div className="v-sub">You have shattered the system.<br/>Freedom has been reclaimed from the ashes.</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"center",padding:"12px 24px",background:"rgba(212,175,55,.06)",border:`1px solid ${C.goldD}`,borderRadius:2}}>
            <div className="v-stat">ROUNDS PLAYED: {gs.round}</div>
            <div className="v-stat" style={{color:C.goldB}}>FINAL BALANCE: ¢{gs.money}</div>
            <div className="v-stat" style={{color:C.green}}>JUDGE DEFEATED ✦</div>
          </div>
          <button className="btn btn-restart" style={{borderColor:C.goldB,color:C.goldB,marginTop:8}} onClick={restart}>◀ RETURN TO MENU [R]</button>
          <div style={{fontSize:10,color:C.goldD,letterSpacing:2,textAlign:"center",marginTop:4}}>Glory fades. A new session awaits.</div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
